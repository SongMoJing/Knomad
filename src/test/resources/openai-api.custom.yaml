# yaml-language-server: $schema=schema.yaml
version: 'v1.0.0'
variables:
  Model:
    type: String
    required: true
    description: 需要调用的模型
  Content:
    type: List
    required: true
    description: 对话列表
baseUrl: 'https://ai.your-lover.cyou/v1'
endpoints:
  completions:
    path: '/chat/completions'
    methods:
      POST:
        request:
          headers:
            Authorization: "Bearer ${{env.ApiKey}}"
            'Content-Type': 'application/json'
            Accept: 'application/json'
          body:
            model: "${{variables.Model}}"
            messages: "{{variables.Content}}"
        response:
          - httpCode: 'type:success'
            type: 'appliction/json'
            values:
              - name: content
                type: Map
                path: '$.choices[0].message.content'
          - httpCode: 'code:403'
            type: 'appliction/json'
            values:
              - name: errMsg
                type: String
                path: '$.error.message'
