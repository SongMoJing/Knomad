# yaml-language-server: $schema=schema.yaml

variables:
  Model:
    type: String
    required: true
    description: 需要调用的模型
  Content:
    type: 'List:Dialogue'
    required: true
    description: 对话列表
types:
  Dialogue:
    description: 对话内容
    struct:
      role:
        type: String
        description: null
        struct: null
      content:
        type: String
        description: null
        struct: null
baseUrl: 'https://ai.your-lover.cyou/v1'
endpoints:
  completions:
    path: '/chat/completions'
    request:
      method: POST
      headers:
        Authorization: "Bearer ${{env.ApiKey}}"
        'Content-Type': 'application/json'
        Accept: 'application/json'
      body:
        model: "${{variables.Model}}"
        messages: "{{variables.Content}}"
    response:
      - httpCode: 'type:success'
        type: 'appliction/json'
        values:
          - name: content
            type: Dialogue
            path: '$.choices[0].message.content'
      - httpCode: 'code:403'
        type: 'appliction/json'
        values:
          - name: errMsg
            type: String
            path: '$.error.message'
