# yaml-language-server: $schema=schema.yaml
version: 'v1.0.0'
variables:
  Authorization:
    type: String
    required: true
    description: 身份验证
  Content:
    type: String
    required: true
    description: 传入消息
baseUrl: 'http://127.0.0.1:8080'
endpoints:
  get:
    path: '/get'
    methods:
      GET:
        request:
          query:
            Query1: 'Hello'
          headers:
            Authorization: "Bearer ${{variables.Authorization}}"
            'Content-Type': 'application/json'
            Accept: 'application/json'
        response:
          - httpCode: 'type:success'
            type: 'application/json'
            values:
              - name: Query1
                type: String
                path: '$.args.Query1'
              - name: Authorization
                type: String
                path: '$.headers.Authorization'
  post:
    path: '/post'
    methods:
      POST:
        request:
          headers:
            Authorization: "Bearer ${{variables.Authorization}}"
            'Content-Type': 'application/json'
            Accept: 'text/event-stream'
          body:
            data: '${{variables.Content}}'
        response:
          - httpCode: 'type:success'
            type: 'text/event-stream'
            values:
              - name: Authorization
                type: String
                path: '$.headers.Authorization'
              - name: Data
                type: String
                path: '$.json.data[0].data'